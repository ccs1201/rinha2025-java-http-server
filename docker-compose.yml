x-backend-templates:
  app: &app
#    build:
#      context: .
#      dockerfile: Dockerfile
    image: csouzadocker/java-http-server-postgres
    networks:
      - backend
      - payment-processor
    deploy:
      resources:
        limits:
          cpus: "0.65"
          memory: "160MB"

  app-env: &app-env
    PAYMENT_PROCESSOR_DEFAULT_URL: "http://payment-processor-default:8080"
    PAYMENT_PROCESSOR_FALLBACK_URL: "http://payment-processor-fallback:8080"
    PAYMENT_PROCESSOR_REQUEST_TIMEOUT: "6000"
    PAYMENT_PROCESSOR_WORKERS: "2"
    PAYMENT_QUEUE: "1000"
    SERVER_PORT: "8080"
    THREAD_POOL_SIZE: "12"
    THREAD_QUEUE_SIZE: "500"

#############################################################################################

services:
  nginx:
    image: nginx:alpine
    container_name: backend-nginx
    hostname: nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "9999:9999"
    depends_on:
      - app1
      - app2
    networks:
      - backend
      - payment-processor
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "30MB"

  app1:
    <<: *app
    container_name: backend-api1
    hostname: app1
    environment:
      <<: *app-env
      INSTANCE_ID: "1"

  app2:
    <<: *app
    container_name: backend-api2
    hostname: app2
    environment:
      <<: *app-env
      INSTANCE_ID: "2"

networks:
  backend:
    driver: bridge
  payment-processor:
    external: true
